name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ghcr.io/comphass/cell-backend
  IMAGE_NAME_FRONTEND: ghcr.io/comphass/cell-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: ${{ env.IMAGE_NAME_BACKEND }}:latest, ${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}, ${{ env.IMAGE_NAME_BACKEND }}:${{ github.ref_name }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ env.IMAGE_NAME_FRONTEND }}:latest, ${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}, ${{ env.IMAGE_NAME_FRONTEND }}:${{ github.ref_name }}
