apiVersion: apps/v1
kind: Deployment
metadata:
  name: cell-backend
  namespace: cell
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cell-backend
  template:
    metadata:
      labels:
        app: cell-backend
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: cell-backend
          image: harbor.hasslab.pro/cell/cell-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cell-secret
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /api/groups
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: cell-backend
  namespace: cell
spec:
  selector:
    app: cell-backend
  ports:
    - port: 80
      targetPort: 8000
