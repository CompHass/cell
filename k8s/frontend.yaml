apiVersion: apps/v1
kind: Deployment
metadata:
  name: cell-frontend
  namespace: cell
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cell-frontend
  template:
    metadata:
      labels:
        app: cell-frontend
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: cell-frontend
          image: harbor.hasslab.pro/cell/cell-frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: cell-frontend
  namespace: cell
spec:
  selector:
    app: cell-frontend
  ports:
    - port: 80
      targetPort: 80
