apiVersion: v1
kind: Secret
metadata:
  name: cell-secret
  namespace: cell
type: Opaque
stringData:
  # Database connection
  DATABASE_URL: "postgresql://postgres:password@postgres:5432/postgres"

  # celula.in API credentials (required for ETL CronJob)
  # Replace with real values before applying: kubectl apply -f k8s/secret.yaml
  CELULA_EMAIL: "your-email@example.com"
  CELULA_PASSWORD: "your-password"
  CELULA_ACCOUNT: "your-account-slug"

  # Comma-separated group IDs to extract (e.g. "123,456")
  CELULA_GROUP_ID: "your-group-id"
