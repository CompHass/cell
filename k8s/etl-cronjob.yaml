apiVersion: batch/v1
kind: CronJob
metadata:
  name: cell-etl
  namespace: cell
  labels:
    app: cell-etl
spec:
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: cell-etl
        spec:
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: harbor-pull-secret
          containers:
            - name: etl
              image: harbor.hasslab.pro/cell/cell-backend:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "[ETL] Starting extract..."
                  python scripts/extract.py
                  echo "[ETL] Extract complete. Starting load..."
                  python scripts/migrate_history.py
                  echo "[ETL] Pipeline complete."
              envFrom:
                - secretRef:
                    name: cell-secret
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "100m"
                limits:
                  memory: "1Gi"
                  cpu: "500m"
